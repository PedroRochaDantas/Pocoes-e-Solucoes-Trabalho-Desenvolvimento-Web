<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - Poções e Soluções</title>

    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <nav>
        <div class="logo">
            Poções & Soluções
        </div>

        <ul>
            <li><a href="index.html">← Voltar para a Loja</a></li>
        </ul>
    </nav>

    <header>
        <h1>Administração da Poções & Soluções</h1>
        <p>
        Gerencie o catálogo de poções disponíveis na loja.
        </p>
    </header>

    <main>

        <section class="cadastro">

            <h2>Cadastrar Nova Poção</h2>

            <form id="form-pocao">

                <input
                    type="text"
                    id="nome"
                    placeholder="Nome da poção"
                    required
                >

                <textarea
                    id="descricao"
                    placeholder="Descrição"
                    required
                ></textarea>

                <input
                    type="text"
                    id="imagem"
                    placeholder="URL da imagem"
                    required
                >

                <input
                    type="number"
                    id="preco"
                    placeholder="Preço"
                    min="0"
                    step="0.01"
                    required
                >

                <button type="submit">
                    Cadastrar
                </button>

            </form>

        </section>

        <section>

            <h2>Poções Cadastradas</h2>

            <div id="lista-admin"></div>

        </section>

    </main>

    <script src="js/admin.js"></script>

</body>
</html>
